    <script>
      // 🛡️ High Security Anti-Inspect & Right-Click Disabler Script
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      }, false);

      document.addEventListener('keydown', function(e) {
        // Prevent F12 DevTools
        if (e.keyCode === 123 || e.key === 'F12') {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Inspect elements)
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67 || e.key === 'I' || e.key === 'J' || e.key === 'C')) {
          e.preventDefault();
          return false;
        }
        // Prevent Cmd+Option+I (Mac Inspect Tools)
        if (e.metaKey && e.altKey && (e.keyCode === 73 || e.key === 'i' || e.key === 'I')) {
          e.preventDefault();
          return false;
        }
        // Prevent Ctrl+U (View HTML Source Code)
        if (e.ctrlKey && (e.keyCode === 85 || e.key === 'u' || e.key === 'U')) {
          e.preventDefault();
          return false;
        }
      }, false);
